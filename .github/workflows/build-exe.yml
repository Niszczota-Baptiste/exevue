name: Build MF Cockpit (.exe)

# Compile le .exe Windows à chaque push sur main, et permet aussi un
# déclenchement manuel depuis l'onglet Actions (bouton "Run workflow").
# L'exe est publié en artefact de run + dans la release roulante « latest »,
# ce qui donne un lien de téléchargement stable :
#   https://github.com/Niszczota-Baptiste/exevue/releases/latest/download/MF_Cockpit.exe
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build .exe (PyInstaller)
        run: pyinstaller MF_Cockpit.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MF_Cockpit-windows
          path: dist/MF_Cockpit.exe
          if-no-files-found: error

      # Release roulante : « latest » est recréée à chaque build, le lien
      # /releases/latest/download/MF_Cockpit.exe reste donc stable.
      - name: Publier la release « latest »
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag -y 2>$null
          gh release create latest dist/MF_Cockpit.exe `
            --title "MF Cockpit (dernier build)" `
            --notes "Build automatique de main ($env:GITHUB_SHA)." `
            --latest
